name: Maize Detection Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest openpyxl pyyaml pandas

      - name: Fix coord sample filename
        run: |
          if [ ! -f docs/coord2025_sample.xlsx ]; then
            for f in docs/Coordinates_Sample.xlsx docs/Coordinates_sample.xlsx; do
              if [ -f "$f" ]; then
                cp "$f" docs/coord2025_sample.xlsx
                echo "Renamed $f"
              fi
            done
          fi

      - name: Run test_pipeline.py
        run: pytest tests/test_pipeline.py -v

      - name: Run test_output.py
        run: |
          if [ -f maize_detections.xlsx ]; then
            pytest tests/test_output.py -v
          else
            echo "⚠️ maize_detect
